name: Drape
options:
  bundleIdPrefix: com.neo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  Drape:
    type: application
    platform: iOS
    sources:
      - path: Drape
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neo.productinroom
        PRODUCT_NAME: Drape
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Chọn ảnh phòng và ảnh sản phẩm để dựng ảnh."
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"

  DrapeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DrapeTests
    dependencies:
      - target: Drape
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neo.productinroom.tests
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  Drape:
    build:
      targets:
        Drape: all
        DrapeTests: [test]
    test:
      targets:
        - DrapeTests
